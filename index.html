        </div>

          <button id="back-button" class="text-button">Back</button>

        <button id="share-button" class="share-button hidden">𝕏&nbsp; SHARE ON X</button>

        <p id="revive-copy">Returning in</p>
        <strong id="revive-countdown">5</strong>

      <section id="settings-screen" class="screen compact settings-screen hidden" role="dialog" aria-modal="true">
